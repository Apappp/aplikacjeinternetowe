<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" name="a">
        <input type="text" name="b">
        <input type="text" name="liczba">
        <button type="submit">Sprawdź</button>
    </form>
    <div class="wynik"></div>
    <script>
        const formularz = document.querySelector('form');
        const wynik = document.querySelector('.wynik');
        formularz.addEventListener('submit', (e)=>{
            e.preventDefault();
            const a = document.querySelector('input[name="a"]').value;
            const b = document.querySelector('input[name="b"]').value;
            const liczba = document.querySelector('input[name="liczba"]').value;
            if (a>b)
                wynik.textContent = "błędny przedział";
            else if ((liczba >= a)&&(liczba <= b))
                wynik.textContent = "Liczba mieści się w przedziale";
            else
                wynik.textContent = "Liczba nie mieści się w przedziale";
        });
    </script>
</body>
</html>
