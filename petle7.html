<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input placeholder="Podaj n" type="text" name="n">
        <input placeholder="Podaj liczbę początkową" type="text" name="a">
        <button type="submit">Sprawdź</button>
    </form>
    <div class="wynik"></div>
    <script>
        const formularz = document.querySelector('form');
        const wynik = document.querySelector('.wynik');
        formularz.addEventListener('submit', (e)=>{
            e.preventDefault();
            let a = document.querySelector('input[name="a"]').value*1;
            const n = document.querySelector('input[name="n"]').value*1;
            let suma = 0;
            for (let i = 1; i <= n; i++){
                suma += a;
                a++;
            }
            let srednia = suma/n;
            document.write("Średnia wynosi: " + srednia);
        });
    </script>
</body>
</html>
