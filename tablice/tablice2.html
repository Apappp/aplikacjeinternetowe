<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let tab = [];
        let k = 0
        for(let i = 1; i <= 100; i++){
            if(i%2==0){
                tab[i/2-1]=i;
            }
            else {
                tab[i+50+k]=i;
                k-=1;
            }
        }
        document.write(tab.join(", "));
    </script>
</body>
</html>
