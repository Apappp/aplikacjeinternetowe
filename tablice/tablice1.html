<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let tab = [];
        for(let i = 1; i <=10; i++){
            tab[i-1] = i;
        }
        document.write(tab.join(", "));
        let sto = 100
        for(let i = 0; i <= 10; i++){
            tab[i]=sto;
            sto--;
        }
        document.write("</br>"+tab.join(", "));
    </script>
</body>
</html>
