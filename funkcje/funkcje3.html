    <script>
        function suma(liczba1, liczba2){
            return liczba1 + liczba2;
        }

        function szescian(liczba1, liczba2){
            return suma(liczba1, liczba2)*suma(liczba1, liczba2)*suma(liczba1,liczba2);
        }
        document.write(szescian(2,3));
