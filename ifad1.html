<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" name="pole">
        <button type="submit">Pokaż</button>
    </form>
    <div class="wynik"></div>
    <script>
        //odwołujemy się do formularza
        const formularz = document.querySelector('form');

        const div = document.querySelector('.wynik');

        //przypisujemy zdarzenie do naszego formularza które uruchomi funkcję przez przeglądarke
        formularz.addEventListener('submit', (e)=>{
            e.preventDefault();
            //odwołujemy się do pola w formularzu
            const wartoscPolaFormularza = document.querySelector('input[name="pole"]').value;
            if (wartoscPolaFormularza%2==0)
                div.textContent = "Liczba jest parzysta";
            else
                div.textContent = "liczba jest nieparzysta";
            
        });
        
    </script>
</body>
</html>
