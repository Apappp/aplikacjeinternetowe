<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" name="liczba">
        <button type="submit">Sprawdź</button>
    </form>
    <div class="wynik"></div>
    <script>
        const formularz = document.querySelector('form');
        const wynik = document.querySelector('.wynik');
        formularz.addEventListener('submit', (e)=>{
            e.preventDefault();
            var liczba = document.querySelector('input[name="liczba"').value;
            liczba*=1;
            switch(liczba){
                case 1:
                    wynik.textContent = "Poniedziałek";
                    break;
                case 2:
                    wynik.textContent = "Wtorek";
                    break;
                case 3:
                    wynik.textContent = "Środa";
                    break;
                case 4:
                    wynik.textContent = "Czwartek";
                    break;
                case 5:
                    wynik.textContent = "Piątek";
                    break;
                case 6:
                    wynik.textContent = "Sobota";
                    break;
                case 7:
                    wynik.textContent = "Niedziela";
                    break;
                default:
                    wynik.textContent = "???";
            }
            

        });
    </script>
</body>
</html>
