<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" name="a">
        <input type="text" name="b">
        <button type="submit">Sprawdź</button>
    </form>
    <div class="wynik"></div>
    <script>
        const formularz = document.querySelector('form');
        const wynik = document.querySelector('.wynik');
        formularz.addEventListener('submit', (e)=>{
            e.preventDefault();
            const a = document.querySelector('input[name="a"]').value;
            const b = document.querySelector('input[name="b"]').value;
            if (a%b==0)
                wynik.textContent = "liczba a jest podzielna przez liczbę b";
            else
                wynik.textContent = "liczba a nie jest podzielna przez liczbę b";
        });
    </script>
</body>
</html>
