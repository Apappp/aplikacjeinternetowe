<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const r = prompt('Podaj promień okręgu:');
        const p = 3.14 * r * r;
        const obw = 2 * 3.14 * r;
        document.write('<div>Pole koła wynosi: ' + p + '</div>');
        document.write('<div>Obwód koła wynosi: ' + obw + '</div>');
    </script>
</body>
</html>
