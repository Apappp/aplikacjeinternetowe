<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input placeholder="szerokość" type="text" name="a">
        <input placeholder="wysokość" type="text" name="b">
        <button type="submit">Sprawdź</button>
    </form>
    <div class="wynik"></div>
    <script>
        const formularz = document.querySelector('form');
        const wynik = document.querySelector('.wynik');
        formularz.addEventListener('submit', (e)=>{
            e.preventDefault();
            const a = document.querySelector('input[name="a"]').value;
            const b = document.querySelector('input[name="b"]').value;
            for (let i = 1; i <= a; i++){
                document.write("*");
            }
            document.write("</br>")
            for (let j = 1; j <= b-2; j++)
            {
                document.write("*");
                for(let h = 1; h <= 2*a-4; h++){
                    document.write("&nbsp");
                }
                document.write("*</br>");
            }
            for (let i = 1; i <= a; i++){
                document.write("*");
            }
            
        });
    </script>
</body>
</html>
